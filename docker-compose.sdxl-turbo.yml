services:
  sdxl-turbo:
    build:
      context: ./services/sdxl-turbo
      dockerfile: Dockerfile
      args:
        AI_TORCH_INDEX_URL: ${AI_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu121}
    container_name: nexus-sdxl-turbo
    ports:
      - "${SDXL_TURBO_PORT:-9050}:9050"
    environment:
      - SDXL_TURBO_MODEL_ID=${SDXL_TURBO_MODEL_ID:-stabilityai/sdxl-turbo}
      - SDXL_TURBO_CACHE_DIR=/data/cache
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - NVIDIA_VISIBLE_DEVICES=${SDXL_TURBO_CUDA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${SDXL_TURBO_CUDA_VISIBLE_DEVICES:-all}
      - SDXL_TURBO_DEVICE=${SDXL_TURBO_DEVICE:-cuda}
      - SDXL_TURBO_DTYPE=${SDXL_TURBO_DTYPE:-float16}
      - SDXL_TURBO_ENABLE_MODEL_CPU_OFFLOAD=${SDXL_TURBO_ENABLE_MODEL_CPU_OFFLOAD:-false}
      - SDXL_TURBO_ENABLE_SEQUENTIAL_CPU_OFFLOAD=${SDXL_TURBO_ENABLE_SEQUENTIAL_CPU_OFFLOAD:-false}
      - SDXL_TURBO_NUM_INFERENCE_STEPS=${SDXL_TURBO_NUM_INFERENCE_STEPS:-1}
      - SDXL_TURBO_GUIDANCE_SCALE=${SDXL_TURBO_GUIDANCE_SCALE:-0.0}
      - SDXL_TURBO_WIDTH=${SDXL_TURBO_WIDTH:-512}
      - SDXL_TURBO_HEIGHT=${SDXL_TURBO_HEIGHT:-512}
    volumes:
      - ./.runtime/sdxl-turbo:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

  sdxl-turbo-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=sdxl-turbo
      - NEXUS_SERVICE_BASE_URL=${SDXL_TURBO_ADVERTISE_BASE_URL:-${SDXL_TURBO_BASE_URL:-http://sdxl-turbo:9050}}
      - NEXUS_SERVICE_HEALTH_URL=http://sdxl-turbo:9050/readyz
      - NEXUS_SERVICE_BACKEND_CLASS=gpu_fast
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - sdxl-turbo
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
