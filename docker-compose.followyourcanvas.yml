services:
  followyourcanvas:
    build:
      context: ./services/followyourcanvas
      dockerfile: Dockerfile
    container_name: nexus-followyourcanvas
    ports:
      - "${FYC_PORT:-9165}:9165"
    environment:
      - FYC_PORT=9165
      - FYC_WORKDIR=${FYC_WORKDIR:-/data/app}
      - FYC_REPO_URL=${FYC_REPO_URL:-https://github.com/mayuelala/FollowYourCanvas.git}
      - FYC_REPO_REF=${FYC_REPO_REF:-}
      - FYC_UPDATE_ON_START=${FYC_UPDATE_ON_START:-false}
      - FYC_TIMEOUT_SEC=${FYC_TIMEOUT_SEC:-1800}
      - FYC_DEFAULT_CONFIG=${FYC_DEFAULT_CONFIG:-infer-configs/prompt-panda-nexus.yaml}
    volumes:
      - ./.runtime/followyourcanvas:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

  followyourcanvas-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=followyourcanvas
      - NEXUS_SERVICE_BASE_URL=${FOLLOWYOURCANVAS_ADVERTISE_BASE_URL:-${FOLLOWYOURCANVAS_BASE_URL:-http://followyourcanvas:9165}}
      - NEXUS_SERVICE_HEALTH_URL=http://followyourcanvas:9165/readyz
      - NEXUS_SERVICE_BACKEND_CLASS=followyourcanvas
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - followyourcanvas
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
