services:
  followyourcanvas:
    build:
      context: ./services/followyourcanvas
      dockerfile: Dockerfile
    container_name: nexus-followyourcanvas
    ports:
      - "${FYC_PORT:-9165}:9165"
    environment:
      - FYC_PORT=9165
      - FYC_WORKDIR=${FYC_WORKDIR:-/data/app}
      - FYC_REPO_URL=${FYC_REPO_URL:-https://github.com/mayuelala/FollowYourCanvas.git}
      - FYC_REPO_REF=${FYC_REPO_REF:-}
      - FYC_UPDATE_ON_START=${FYC_UPDATE_ON_START:-false}
      - FYC_TIMEOUT_SEC=${FYC_TIMEOUT_SEC:-1800}
    volumes:
      - ./.runtime/followyourcanvas:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}