services:
  # Ollama Service - LLM inference
  # Shared host paths:
  # - ./.runtime/ollama is Ollama's persistent model store
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/root/.ollama/models
    volumes:
      - ./.runtime/ollama:/root/.ollama
    networks:
      - nexus
    restart: unless-stopped
    # CPU-only by default.
    # If you want NVIDIA GPU acceleration on Linux, add it via an override compose file
    # that reserves an NVIDIA device (and ensure NVIDIA Container Toolkit is installed).
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=ollama
      - NEXUS_SERVICE_BASE_URL=${OLLAMA_ADVERTISE_BASE_URL:-${OLLAMA_BASE_URL:-http://ollama:11434}}
      - NEXUS_SERVICE_HEALTH_URL=http://ollama:11434/api/version
      - NEXUS_SERVICE_BACKEND_CLASS=ollama
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - ollama
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
