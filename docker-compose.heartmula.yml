services:
  heartmula:
    build:
      context: ./services/heartmula
      dockerfile: Dockerfile
    container_name: nexus-heartmula
    ports:
      - "${HEARTMULA_PORT:-9185}:9185"
    environment:
      - HEARTMULA_PORT=9185
      - HEARTMULA_WORKDIR=${HEARTMULA_WORKDIR:-/data/app}
      - HEARTMULA_REPO_URL=${HEARTMULA_REPO_URL:-https://github.com/HeartMuLa/heartlib.git}
      - HEARTMULA_REPO_REF=${HEARTMULA_REPO_REF:-}
      - HEARTMULA_UPDATE_ON_START=${HEARTMULA_UPDATE_ON_START:-false}
      - HEARTMULA_TIMEOUT_SEC=${HEARTMULA_TIMEOUT_SEC:-1200}
    volumes:
      - ./.runtime/heartmula:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

  heartmula-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=heartmula
      - NEXUS_SERVICE_BASE_URL=${HEARTMULA_BASE_URL:-http://heartmula:9185}
      - NEXUS_SERVICE_HEALTH_URL=http://heartmula:9185/readyz
      - NEXUS_SERVICE_BACKEND_CLASS=heartmula_music
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - heartmula
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}