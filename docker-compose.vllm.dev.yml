services:
  vllm:
    container_name: nexus-vllm-dev
    ports:
      - "${DEV_VLLM_PORT:-18000}:8000"
    volumes:
      - ./.runtime/vllm-dev/cache:/root/.cache/huggingface

  vllm-fast:
    container_name: nexus-vllm-fast-dev
    ports:
      - "${DEV_VLLM_FAST_PORT:-18001}:8000"
    volumes:
      - ./.runtime/vllm-dev/cache:/root/.cache/huggingface

  vllm-embeddings:
    container_name: nexus-vllm-embeddings-dev
    ports:
      - "${DEV_VLLM_EMBEDDINGS_PORT:-18002}:8000"
    volumes:
      - ./.runtime/vllm-dev/cache:/root/.cache/huggingface

networks:
  nexus:
    name: nexus-dev

volumes: {}
