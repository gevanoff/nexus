services:
  skyreels-v2:
    build:
      context: ./services/skyreels-v2
      dockerfile: Dockerfile
    container_name: nexus-skyreels-v2
    ports:
      - "${SKYREELS_PORT:-9180}:9180"
    environment:
      - SKYREELS_PORT=9180
      - SKYREELS_WORKDIR=${SKYREELS_WORKDIR:-/data/app}
      - SKYREELS_REPO_URL=${SKYREELS_REPO_URL:-https://github.com/SkyworkAI/SkyReels-V2}
      - SKYREELS_REPO_REF=${SKYREELS_REPO_REF:-}
      - SKYREELS_UPDATE_ON_START=${SKYREELS_UPDATE_ON_START:-false}
      - SKYREELS_TIMEOUT_SEC=${SKYREELS_TIMEOUT_SEC:-3600}
    volumes:
      - ./.runtime/skyreels-v2:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

  skyreels-v2-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=skyreels-v2
      - NEXUS_SERVICE_BASE_URL=${SKYREELS_V2_ADVERTISE_BASE_URL:-${SKYREELS_V2_BASE_URL:-http://skyreels-v2:9180}}
      - NEXUS_SERVICE_HEALTH_URL=http://skyreels-v2:9180/readyz
      - NEXUS_SERVICE_BACKEND_CLASS=skyreels_v2
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - skyreels-v2
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}