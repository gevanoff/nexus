version: '3.8'

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: nexus-vllm
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL_STRONG:-Qwen/Qwen2.5-32B-Instruct}
      - --served-model-name
      - ${VLLM_MODEL_STRONG:-Qwen/Qwen2.5-32B-Instruct}
      - --generation-config
      - vllm
    volumes:
      - ../../.runtime/vllm/cache:/root/.cache/huggingface
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    external: true
    name: nexus

volumes:
  {}
