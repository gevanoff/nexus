services:
  # MLX Service - OpenAI-compatible MLX server
  # Shared host paths:
  # - ./.runtime/mlx/cache is MLX model/cache persistence
  mlx:
    build:
      context: ./services/mlx
      dockerfile: Dockerfile
    container_name: nexus-mlx
    ports:
      - "${MLX_PORT:-10240}:10240"
    env_file:
      - ./.env
    environment:
      - MLX_HOST=0.0.0.0
      - MLX_PORT=10240
      - MLX_MODEL_PATH=${MLX_MODEL_PATH:-mlx-community/gemma-2-2b-it-8bit}
      - MLX_MODEL_TYPE=${MLX_MODEL_TYPE:-lm}
      - HF_HOME=/var/lib/mlx/cache/huggingface
      - XDG_CACHE_HOME=/var/lib/mlx/cache
    volumes:
      - ./.runtime/mlx/cache:/var/lib/mlx/cache
    networks:
      - nexus
    # MLX runtime is Apple-Silicon/macOS specific; this Linux container may exit
    # immediately on unsupported hosts. Keep restart disabled to avoid noisy loops.
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10240/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  mlx-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=mlx
      - NEXUS_SERVICE_BASE_URL=${MLX_BASE_URL:-http://mlx:10240/v1}
      - NEXUS_SERVICE_HEALTH_URL=http://mlx:10240/v1/models
      - NEXUS_SERVICE_BACKEND_CLASS=local_mlx
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - mlx
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
