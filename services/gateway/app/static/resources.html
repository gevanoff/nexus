<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nexus Resources</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d12;
        --panel: #111821;
        --border: rgba(231,237,246,0.12);
        --text: #e7edf6;
        --muted: #a9b4c3;
        --accent: #6fb8ff;
        --good: #6fdda8;
        --warn: #f0c85a;
        --bad: #ff8585;
        --purple: #e000ff;
        --unknown: #9aa6b6;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(111,184,255,0.16), transparent 60%),
          radial-gradient(900px 500px at 80% 0%, rgba(139,227,201,0.12), transparent 55%),
          linear-gradient(180deg, #0a0d12 0%, #0c1016 100%);
        color: var(--text);
      }
      main { max-width: 1180px; margin: 0 auto; padding: 16px; }
      header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom: 12px; }
      h1 { margin: 0; font-size: 16px; font-weight: 650; }
      h2 { margin: 0 0 10px; font-size: 14px; font-weight: 650; }
      .hint { font-size: 12px; color: var(--muted); }
      .row { display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .pill { display:inline-flex; gap:8px; align-items:center; padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px; background: linear-gradient(180deg, rgba(20,26,36,0.8), rgba(14,19,28,0.8)); color: var(--text); text-decoration:none; }
      .layout { display:grid; grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.4fr); gap: 12px; align-items:start; }
      .card { border: 1px solid var(--border); background: linear-gradient(180deg, rgba(17,24,33,0.95), rgba(11,16,23,0.95)); border-radius: 8px; padding: 12px; box-shadow: 0 12px 30px rgba(6,10,16,0.35); }
      .host-list, .backend-list { display:flex; flex-direction:column; gap:10px; }
      .host-name, .backend-name { font-weight: 650; }
      .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .bar { height: 12px; border-radius: 999px; border: 1px solid rgba(231,237,246,0.10); background: rgba(231,237,246,0.05); overflow: hidden; margin-top: 8px; }
      .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--good), var(--accent)); }
      .bar-fill.warn { background: linear-gradient(90deg, var(--warn), #f59f53); }
      .bar-fill.bad { background: linear-gradient(90deg, #f27474, var(--bad)); }
      .backend-card { display:grid; grid-template-columns: 1fr auto; gap: 8px; align-items:center; border: 1px solid rgba(231,237,246,0.10); border-radius: 8px; padding: 10px; background: rgba(14,20,30,0.62); }
      .backend-card.active { border-color: rgba(39,174,96,0.58); background: rgba(12, 76, 48, 0.24); }
      .backend-card.blocked { border-color: rgba(255,133,133,0.24); }
      .backend-card.status-active_unhealthy { border-color: rgba(255,73,97,0.58); background: rgba(140, 18, 36, 0.22); }
      .backend-card.status-traded_out_working { border-color: rgba(111,184,255,0.36); background: rgba(46,102,159,0.16); }
      .backend-card.status-inactive_unhealthy { border-color: rgba(255,0,255,0.80); background: rgba(150,0,190,0.34); }
      .backend-card.status-inactive_unknown { border-color: rgba(220,228,240,0.38); background: rgba(220,228,240,0.10); }
      .badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
      .badge { font-size: 11px; padding: 3px 7px; border-radius: 999px; border: 1px solid rgba(231,237,246,0.12); color: #cfe0f7; }
      .badge.crucial { border-color: rgba(111,184,255,0.36); color: #cfe7ff; }
      .badge.high { border-color: rgba(240,200,90,0.36); color: #f3dc96; }
      .badge.optional { border-color: rgba(169,180,195,0.24); color: #c5cfdd; }
      .badge.ok { background: rgba(0,120,72,0.20); border-color: rgba(56,197,126,0.68); color: #98f0bf; }
      .badge.bad { border-color: rgba(255,133,133,0.34); color: #ffc3c3; }
      .badge.green { background: rgba(0,120,72,0.22); border-color: rgba(56,197,126,0.72); color: #98f0bf; }
      .badge.blue { border-color: rgba(111,184,255,0.42); color: #cfe7ff; }
      .badge.purple { background: rgba(224,0,255,0.22); border-color: rgba(255,0,255,0.95); color: #ffd0ff; }
      .badge.grey { background: rgba(235,242,250,0.18); border-color: rgba(235,242,250,0.62); color: #f8fbff; }
      .badge.red { background: rgba(170,22,42,0.28); border-color: rgba(255,73,97,0.78); color: #ff9aa8; }
      .badge.yellow { border-color: rgba(240,200,90,0.36); color: #f3dc96; }
      button { font: inherit; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); color: var(--text); cursor:pointer; background: linear-gradient(180deg, rgba(22,28,38,0.95), rgba(15,20,28,0.95)); }
      button:hover { border-color: rgba(111,184,255,0.44); }
      button[data-danger="true"] { border-color: rgba(255,133,133,0.28); color: #ffd5d5; }
      button:disabled { opacity: 0.6; cursor: default; }
      .status { margin-bottom: 12px; min-height: 18px; }
      .error { color: #ffb6b6; }
      .decision { white-space: pre-wrap; word-break: break-word; }
      @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="/static/ui_roles.css?v=1" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Nexus resources</h1>
          <div class="hint">GPU pressure, backend tiers, and lifecycle actions.</div>
        </div>
        <div class="row">
          <a class="pill" href="/ui" data-ui-role="nav">Back to Chat</a>
          <button id="refresh" type="button" data-ui-role="secondary">Refresh</button>
        </div>
      </header>
      <div id="status" class="hint status"></div>
      <div class="layout">
        <section class="card">
          <h2>Hosts</h2>
          <div id="hosts" class="host-list"></div>
        </section>
        <section class="card">
          <h2>Backends</h2>
          <div id="backends" class="backend-list"></div>
        </section>
      </div>
    </main>
    <script src="/static/auth_client.js?v=1"></script>
    <script src="/static/resources.js?v=4"></script>
  </body>
</html>
