# Backend configuration: defines backend classes, capabilities, and enforcement policies
# This is the single source of truth for routing, admission control, and payload policies

backends:
  local_mlx:
    class: local_mlx
    provider: mlx
    base_url: ${MLX_BASE_URL}
    description: macOS Nexa (MLX) - local inference
    supported_capabilities:
      - chat
      - embeddings
      - images
      - transcription
    concurrency_limits:
      chat: 2
      embeddings: 2
      images: 1
      transcription: 1
    health:
      # OpenAI-style servers commonly expose /models but not /healthz.
      # Use /models as a lightweight liveness/readiness signal.
      liveness: /models
      readiness: /models
    payload_policy:
      # MLX media behavior depends on the configured model set.
      images_format: null

  gpu_fast:
    class: gpu_fast
    base_url: ${SDXL_TURBO_BASE_URL}
    description: SDXL Turbo image backend
    supported_capabilities:
      - images
    concurrency_limits:
      images: 2
    health:
      liveness: /health
      readiness: /readyz
    payload_policy:
      images_format: url
      images_allow_base64: true
      images_max_bytes: 50000000

  ollama:
    class: ollama
    provider: ollama
    base_url: ${OLLAMA_BASE_URL}
    description: localhost Ollama
    supported_capabilities:
      - chat
      - embeddings
    concurrency_limits:
      chat: 4
      embeddings: 4
    health:
      liveness: /api/version
      readiness: /api/version
    payload_policy:
      images_format: null

  gpu_heavy:
    class: gpu_heavy
    base_url: ${IMAGES_HTTP_BASE_URL}
    description: InvokeAI-backed OpenAI images shim
    supported_capabilities:
      - images
    concurrency_limits:
      images: 2
    health:
      liveness: /healthz
      readiness: /readyz
    payload_policy:
      # Images default to URL, only allow base64 when explicitly requested
      images_format: url
      images_allow_base64: true
      images_max_bytes: 50000000

  heartmula_music:
    class: heartmula_music
    base_url: ${HEARTMULA_BASE_URL}
    description: HeartMula music generator (HTTP)
    supported_capabilities:
      - music
    concurrency_limits:
      music: 2
    health:
      liveness: /health
      readiness: /readyz
    payload_policy: {}

  pocket_tts:
    class: pocket_tts
    base_url: ${POCKET_TTS_BASE_URL}
    description: Pocket TTS backend
    supported_capabilities:
      - tts
    concurrency_limits:
      tts: 4
    health:
      liveness: /healthz
      readiness: /readyz
    payload_policy: {}

  qwen3_tts:
    class: qwen3_tts
    base_url: ${QWEN3_TTS_BASE_URL}
    description: Qwen3-TTS shim
    supported_capabilities:
      - tts
    concurrency_limits:
      tts: 2
    health:
      liveness: /health
      readiness: /readyz
    payload_policy: {}

  skyreels_v2:
    class: skyreels_v2
    base_url: ${SKYREELS_V2_BASE_URL}
    description: SkyReels-V2 video shim
    supported_capabilities:
      - video
    concurrency_limits:
      video: 1
    health:
      liveness: /healthz
      readiness: /readyz
    payload_policy: {}

  followyourcanvas:
    class: followyourcanvas
    base_url: ${FOLLOWYOURCANVAS_BASE_URL}
    description: FollowYourCanvas video shim
    supported_capabilities:
      - video
    concurrency_limits:
      video: 1
    health:
      liveness: /healthz
      readiness: /readyz
    payload_policy: {}

  lighton_ocr:
    class: lighton_ocr
    base_url: ${LIGHTON_OCR_API_BASE_URL}
    description: LightOnOCR shim
    supported_capabilities:
      - ocr
    concurrency_limits:
      ocr: 2
    health:
      liveness: /health
      readiness: /readyz
    payload_policy: {}

  personaplex:
    class: personaplex
    base_url: ${PERSONAPLEX_BASE_URL}
    description: PersonaPlex chat shim
    supported_capabilities: []
    concurrency_limits: {}
    health:
      liveness: /healthz
      readiness: /readyz
    payload_policy: {}

  luxtts:
    class: luxtts
    base_url: ${LUXTTS_BASE_URL}
    description: LuxTTS shim
    supported_capabilities:
      - tts
    concurrency_limits:
      tts: 2
    health:
      liveness: /health
      readiness: /readyz
    payload_policy: {}

# Legacy backend names map to backend classes
legacy_mapping:
  mlx: local_mlx
