server:
  host: 0.0.0.0
  port: 10240

models:
  # Default text/chat model
  - served_model_name: mlx-community/Qwen2.5-32B-Instruct-4bit
    model_path: mlx-community/Qwen2.5-32B-Instruct-4bit
    model_type: lm

  # Dedicated embeddings model
  - served_model_name: mlx-community/embeddinggemma-300m-4bit
    model_path: mlx-community/embeddinggemma-300m-4bit
    model_type: embeddings

  # Optional multimodal model for image/audio-aware chat
  - served_model_name: mlx-community/Qwen2-VL-7B-Instruct-4bit
    model_path: mlx-community/Qwen2-VL-7B-Instruct-4bit
    model_type: multimodal

  # Optional image generation model. Uncomment after installing the image extras
  # for mlx-openai-server and selecting a config_name supported by that model.
  # - served_model_name: flux2-klein-4b
  #   model_path: black-forest-labs/FLUX.2-klein-4B
  #   model_type: image-generation
  #   config_name: flux2-klein-4b
  #   quantize: 4

  # Optional image editing model.
  # - served_model_name: qwen-image-edit
  #   model_path: mlx-community/Qwen-Image-Edit-4bit
  #   model_type: image-edit
  #   config_name: qwen-image-edit

  # Optional Whisper transcription model (requires ffmpeg on the host).
  # - served_model_name: mlx-community/whisper-large-v3-mlx
  #   model_path: mlx-community/whisper-large-v3-mlx
  #   model_type: whisper
