services:
  # Qwen3-TTS Service - OpenAI-compatible TTS shim
  # Shared host paths:
  # - ./.runtime/qwen3-tts/data is Qwen3-TTS state/cache/workdir
  qwen3-tts:
    build:
      context: ./services/qwen3-tts
      dockerfile: Dockerfile
    container_name: nexus-qwen3-tts
    ports:
      - "${QWEN3_TTS_PORT:-9175}:9175"
    environment:
      - QWEN3_TTS_HOST=0.0.0.0
      - QWEN3_TTS_PORT=9175
      - QWEN3_TTS_MODEL=${QWEN3_TTS_MODEL:-qwen3-tts}
      - QWEN3_TTS_OUTPUT_FORMAT=${QWEN3_TTS_OUTPUT_FORMAT:-wav}
      - QWEN3_TTS_UPSTREAM_BASE_URL=${QWEN3_TTS_UPSTREAM_BASE_URL:-}
      - QWEN3_TTS_UPSTREAM_ENDPOINT=${QWEN3_TTS_UPSTREAM_ENDPOINT:-/v1/audio/speech}
      - QWEN3_TTS_RUN_COMMAND=${QWEN3_TTS_RUN_COMMAND:-python /app/app/scripts/run_qwen3_tts.py}
      - QWEN3_TTS_APP_DIR=${QWEN3_TTS_APP_DIR:-/var/lib/qwen3-tts/app}
      - QWEN3_TTS_MODEL_ID=${QWEN3_TTS_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - QWEN3_TTS_TASK=${QWEN3_TTS_TASK:-custom_voice}
      - QWEN3_TTS_LANGUAGE=${QWEN3_TTS_LANGUAGE:-Auto}
      - QWEN3_TTS_SPEAKER=${QWEN3_TTS_SPEAKER:-Vivian}
      - QWEN3_TTS_VOICE_MAP_JSON=${QWEN3_TTS_VOICE_MAP_JSON:-}
      - QWEN3_TTS_REF_MAP_JSON=${QWEN3_TTS_REF_MAP_JSON:-}
      - QWEN3_TTS_INSTRUCT=${QWEN3_TTS_INSTRUCT:-}
      - QWEN3_TTS_REF_AUDIO=${QWEN3_TTS_REF_AUDIO:-}
      - QWEN3_TTS_REF_TEXT=${QWEN3_TTS_REF_TEXT:-}
      - QWEN3_TTS_REFS_DIR=${QWEN3_TTS_REFS_DIR:-/var/lib/qwen3-tts/voices}
      - QWEN3_TTS_EXPOSE_REF_VOICES=${QWEN3_TTS_EXPOSE_REF_VOICES:-false}
      - QWEN3_TTS_SHARED_REFS_DIR=${QWEN3_TTS_SHARED_REFS_DIR:-/var/lib/tts_refs}
      - QWEN3_TTS_SYNC_SHARED_REFS=${QWEN3_TTS_SYNC_SHARED_REFS:-true}
      - QWEN3_TTS_SYNC_OVERWRITE=${QWEN3_TTS_SYNC_OVERWRITE:-false}
      - QWEN3_TTS_REFS_REF_TEXT=${QWEN3_TTS_REFS_REF_TEXT:-}
      - QWEN3_TTS_X_VECTOR_ONLY=${QWEN3_TTS_X_VECTOR_ONLY:-false}
      - QWEN3_TTS_DEVICE_MAP=${QWEN3_TTS_DEVICE_MAP:-cpu}
      - QWEN3_TTS_DTYPE=${QWEN3_TTS_DTYPE:-float32}
      - QWEN3_TTS_ATTN_IMPL=${QWEN3_TTS_ATTN_IMPL:-}
      - QWEN3_TTS_TIMEOUT_SEC=${QWEN3_TTS_TIMEOUT_SEC:-300}
      - QWEN3_TTS_READYZ_TIMEOUT_SEC=${QWEN3_TTS_READYZ_TIMEOUT_SEC:-20}
      - QWEN3_TTS_WORKDIR=${QWEN3_TTS_WORKDIR:-/app}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      - HF_HOME=${HF_HOME:-/var/lib/huggingface}
    volumes:
      - ./.runtime/qwen3-tts/data:/var/lib/qwen3-tts
      - ./.runtime/tts_refs:/var/lib/tts_refs:ro
      - ./.runtime/huggingface:/var/lib/huggingface
    networks:
      - nexus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9175/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
