services:
  # TTS Service - Text-to-Speech
  # Shared host paths:
  # - ./.runtime/tts/data is the TTS service's state dir
  # - ./.runtime/tts_refs is shared reference audio (mounted read-only)
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    container_name: nexus-tts
    ports:
      - "${TTS_PORT:-9940}:9940"
    environment:
      - POCKET_TTS_HOST=0.0.0.0
      - POCKET_TTS_PORT=9940
      - POCKET_TTS_BACKEND=${POCKET_TTS_BACKEND:-auto}
      - POCKET_TTS_MODEL_NAME=${POCKET_TTS_MODEL_NAME:-pocket-tts}
      - POCKET_TTS_MODEL_PATH=${POCKET_TTS_MODEL_PATH:-}
      - POCKET_TTS_VOICE=${POCKET_TTS_VOICE:-alba}
      - POCKET_TTS_COMMAND=${POCKET_TTS_COMMAND:-pocket-tts}
      - POCKET_TTS_REFS_DIR=${POCKET_TTS_REFS_DIR:-/var/lib/tts_refs}
      - POCKET_TTS_EXPOSE_REF_VOICES=${POCKET_TTS_EXPOSE_REF_VOICES:-false}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      - HF_HOME=${HF_HOME:-/var/lib/huggingface}
    volumes:
      - ./.runtime/tts/data:/data
      - ./.runtime/tts_refs:/var/lib/tts_refs:ro
      - ./.runtime/huggingface:/var/lib/huggingface
    networks:
      - nexus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9940/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
