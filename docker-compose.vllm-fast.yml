services:
  vllm-fast:
    image: vllm/vllm-openai:latest
    container_name: nexus-vllm-fast
    gpus: all
    ports:
      - "${VLLM_FAST_PORT:-8001}:8000"
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=${VLLM_FAST_CUDA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${VLLM_FAST_CUDA_VISIBLE_DEVICES:-all}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL_FAST:-unsloth/Qwen3-30B-A3B-GGUF:Q4_K_M}
      - --served-model-name
      - ${VLLM_FAST_SERVED_MODEL_NAME:-${VLLM_MODEL_FAST:-unsloth/Qwen3-30B-A3B-GGUF:Q4_K_M}}
      - --tokenizer
      - ${VLLM_FAST_TOKENIZER:-${VLLM_MODEL_FAST:-unsloth/Qwen3-30B-A3B-GGUF:Q4_K_M}}
      - --generation-config
      - vllm
      - --tensor-parallel-size
      - "${VLLM_FAST_TENSOR_PARALLEL_SIZE:-1}"
      - --gpu-memory-utilization
      - "${VLLM_FAST_GPU_MEMORY_UTILIZATION:-0.90}"
      - --max-model-len
      - "${VLLM_FAST_MAX_MODEL_LEN:-32768}"
    volumes:
      - ./.runtime/vllm/cache:/root/.cache/huggingface
    networks:
      - nexus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  vllm-fast-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=${VLLM_FAST_SERVICE_NAME:-vllm-fast}
      - NEXUS_SERVICE_BASE_URL=${VLLM_FAST_ADVERTISE_BASE_URL:-${VLLM_FAST_BASE_URL:-http://vllm-fast:8000/v1}}
      - NEXUS_SERVICE_HEALTH_URL=http://vllm-fast:8000/v1/models
      - NEXUS_SERVICE_BACKEND_CLASS=${VLLM_FAST_BACKEND_CLASS:-local_vllm_fast}
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - vllm-fast
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
