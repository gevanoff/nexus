services:
  personaplex:
    build:
      context: ./services/personaplex
      dockerfile: Dockerfile
    container_name: nexus-personaplex
    ports:
      - "${PERSONAPLEX_PORT:-9160}:9160"
    environment:
      - PERSONAPLEX_PORT=9160
      - PERSONAPLEX_MODEL=${PERSONAPLEX_MODEL:-personaplex}
      - PERSONAPLEX_WORKDIR=${PERSONAPLEX_WORKDIR:-/data/app}
      - PERSONAPLEX_REPO_URL=${PERSONAPLEX_REPO_URL:-https://github.com/NVIDIA/personaplex}
      - PERSONAPLEX_REPO_REF=${PERSONAPLEX_REPO_REF:-}
      - PERSONAPLEX_UPDATE_ON_START=${PERSONAPLEX_UPDATE_ON_START:-false}
      - PERSONAPLEX_TIMEOUT_SEC=${PERSONAPLEX_TIMEOUT_SEC:-120}
      - PERSONAPLEX_DEVICE=${PERSONAPLEX_DEVICE:-cuda}
      - PERSONAPLEX_UPSTREAM_BASE_URL=${PERSONAPLEX_UPSTREAM_BASE_URL:-}
    volumes:
      - ./.runtime/personaplex:/data
    gpus: all
    networks:
      - nexus
    restart: unless-stopped

  personaplex-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=personaplex
      - NEXUS_SERVICE_BASE_URL=${PERSONAPLEX_ADVERTISE_BASE_URL:-${PERSONAPLEX_BASE_URL:-http://personaplex:9160}}
      - NEXUS_SERVICE_HEALTH_URL=http://personaplex:9160/readyz
      - NEXUS_SERVICE_BACKEND_CLASS=personaplex
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - personaplex
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}