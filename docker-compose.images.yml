services:
  # Image Generation Service (InvokeAI)
  # Shared host paths:
  # - ./.runtime/images/* is the images service's state and models cache
  images:
    build:
      context: ./services/images
      dockerfile: Dockerfile
    container_name: nexus-images
    ports:
      - "${IMAGES_PORT:-7860}:7860"
    environment:
      # OpenAI Images API shim (InvokeAI-compatible)
      - SHIM_MODE=${IMAGES_SHIM_MODE:-stub}
      - SHIM_PORT=7860
      # Optional: only used when SHIM_MODE=invokeai_queue
      - INVOKEAI_BASE_URL=${INVOKEAI_BASE_URL:-http://invokeai:9090}
    volumes:
      - ./.runtime/images/data:/data
      - ./.runtime/images/models:/data/models
    networks:
      - nexus
    restart: unless-stopped
    # Note: GPU is only required if/when you run a real image backend.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  images-registrar:
    build:
      context: ./services/service-registrar
      dockerfile: Dockerfile
    environment:
      - NEXUS_SERVICE_NAME=images
      - NEXUS_SERVICE_BASE_URL=${IMAGES_ADVERTISE_BASE_URL:-${IMAGES_HTTP_BASE_URL:-http://images:7860}}
      - NEXUS_SERVICE_HEALTH_URL=http://images:7860/readyz
      - NEXUS_SERVICE_METADATA_URL=${IMAGES_ADVERTISE_BASE_URL:-${IMAGES_HTTP_BASE_URL:-http://images:7860}}/v1/metadata
      - NEXUS_SERVICE_BACKEND_CLASS=gpu_heavy
      - ETCD_URL=${ETCD_URL:-http://etcd:2379}
      - NEXUS_REGISTRATION_INTERVAL_SEC=${NEXUS_REGISTRATION_INTERVAL_SEC:-30}
      - NEXUS_REGISTRATION_TIMEOUT_SEC=${NEXUS_REGISTRATION_TIMEOUT_SEC:-5}
    depends_on:
      - images
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
