services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: nexus-vllm
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      - HF_HOME=/root/.cache/huggingface
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - ${VLLM_MODEL_STRONG:-Qwen/Qwen2.5-32B-Instruct}
      - --served-model-name
      - ${VLLM_MODEL_STRONG:-Qwen/Qwen2.5-32B-Instruct}
      - --generation-config
      - vllm
    volumes:
      - ../.runtime/vllm/cache:/root/.cache/huggingface
    networks:
      - nexus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
