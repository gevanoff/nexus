server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    client_max_body_size 128m;
    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Pass through client metadata for proxy-aware allowlisting in gateway.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Forwarded "for=$remote_addr;proto=https;host=$host";

    location = /ui/api/video {
        proxy_http_version 1.1;
        proxy_read_timeout 3700s;
        proxy_send_timeout 3700s;
        proxy_connect_timeout 30s;
        set $gateway_upstream gateway:8800;
        proxy_pass http://$gateway_upstream;
    }

    location / {
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
        set $gateway_upstream gateway:8800;
        proxy_pass http://$gateway_upstream;
    }
}
