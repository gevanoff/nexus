services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
      - "${PERSONAPLEX_PROXY_HTTPS_PORT:-8998}:8998"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ../.runtime/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "ai1:${NEXUS_HOST_AI1_IP}"
      - "ai1.embrient.com:${NEXUS_HOST_AI1_IP}"
      - "ai2:${NEXUS_HOST_AI2_IP}"
      - "ai2.embrient.com:${NEXUS_HOST_AI2_IP}"
      - "ai3:${NEXUS_HOST_AI3_IP}"
      - "ai3.embrient.com:${NEXUS_HOST_AI3_IP}"
      - "ada2:${NEXUS_HOST_ADA2_IP}"
      - "ada2.embrient.com:${NEXUS_HOST_ADA2_IP}"
      - "adada:${NEXUS_HOST_ADADA_IP}"
      - "adada.embrient.com:${NEXUS_HOST_ADADA_IP}"
    networks:
      - nexus
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
