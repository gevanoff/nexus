services:
  # Etcd Service - Service discovery
  # Shared host paths:
  # - ./.runtime/etcd/data is etcd's data dir
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: ${ETCD_CONTAINER_NAME:-nexus-etcd}
    command:
      - /usr/local/bin/etcd
      - --name
      - ${ETCD_NAME:-nexus-etcd}
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - ${ETCD_LISTEN_CLIENT_URLS:-http://0.0.0.0:2379}
      - --advertise-client-urls
      - ${ETCD_ADVERTISE_CLIENT_URLS:-http://etcd:2379}
      - --listen-peer-urls
      - ${ETCD_LISTEN_PEER_URLS:-http://0.0.0.0:2380}
      - --initial-advertise-peer-urls
      - ${ETCD_INITIAL_ADVERTISE_PEER_URLS:-http://etcd:2380}
      - --initial-cluster
      - ${ETCD_INITIAL_CLUSTER:-nexus-etcd=http://etcd:2380}
      - --initial-cluster-state
      - ${ETCD_INITIAL_CLUSTER_STATE:-new}
      - --initial-cluster-token
      - ${ETCD_INITIAL_CLUSTER_TOKEN:-nexus-etcd-cluster}
      - --enable-v2
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/etcdctl
        - --endpoints=http://127.0.0.1:2379
        - endpoint
        - health
    volumes:
      - ./.runtime/etcd/data:/etcd-data
    networks:
      - nexus
    ports:
      - "${ETCD_PORT:-2379}:2379"
      - "${ETCD_PEER_PORT:-2380}:2380"
    restart: unless-stopped

networks:
  nexus:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes: {}
