- name: Bootstrap Nexus hosts for scripted deploy orchestration
  hosts: nexus
  gather_facts: false
  serial: "{{ nexus_deploy_serial }}"
  pre_tasks:
    - name: Bootstrap Python for Ansible modules
      ansible.builtin.include_role:
        name: nexus_bootstrap_python

    - name: Gather facts after Python bootstrap
      ansible.builtin.setup:
  roles:
    - role: nexus_host_prereqs
    - role: nexus_repo
    - role: nexus_docker_runtime
    - role: nexus_mlx_macos
