- name: Run Nexus deploy preflight checks
  ansible.builtin.command:
    argv: "{{ ['/bin/bash', './deploy/scripts/preflight-check.sh', '--mode', 'deploy', '--env-file', nexus_env_file, '--components', (nexus_components | join(','))] }}"
  args:
    chdir: "{{ nexus_repo_dir }}"
  changed_when: false
