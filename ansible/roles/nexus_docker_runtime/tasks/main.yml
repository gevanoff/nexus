- name: Probe for an existing Docker CLI on Linux
  ansible.builtin.raw: "command -v docker || true"
  register: nexus_linux_docker_cli_probe
  changed_when: false
  check_mode: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"

- name: Probe for Docker Compose availability on Linux
  ansible.builtin.raw: |
    if docker compose version >/dev/null 2>&1 || docker-compose version >/dev/null 2>&1; then
      echo present
    fi
  register: nexus_linux_docker_compose_probe
  changed_when: false
  check_mode: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"

- name: Probe for a Docker service definition on Linux
  ansible.builtin.raw: |
    if command -v systemctl >/dev/null 2>&1 && systemctl list-unit-files docker.service >/dev/null 2>&1; then
      echo present
      exit 0
    fi
    if [ -f /etc/init.d/docker ]; then
      echo present
    fi
  register: nexus_linux_docker_service_probe
  changed_when: false
  check_mode: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"

- name: Probe for the docker group on Linux
  ansible.builtin.raw: |
    if command -v getent >/dev/null 2>&1 && getent group docker >/dev/null 2>&1; then
      echo present
    fi
  register: nexus_linux_docker_group_probe
  changed_when: false
  check_mode: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"

- name: Install Docker engine packages on Linux
  ansible.builtin.package:
    name: "{{ nexus_linux_docker_engine_packages.get(ansible_os_family, nexus_linux_docker_engine_packages.get('Debian', [])) }}"
    state: present
  become: true
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"
    - (nexus_linux_docker_cli_probe.stdout | trim) == ""

- name: Ensure Docker Compose is available on Linux
  ansible.builtin.shell: |
    set -euo pipefail
    if docker compose version >/dev/null 2>&1 || docker-compose version >/dev/null 2>&1; then
      exit 0
    fi
    if command -v apt-get >/dev/null 2>&1; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y docker-compose-plugin || apt-get install -y docker-compose
      exit 0
    fi
    if command -v dnf >/dev/null 2>&1; then
      dnf install -y docker-compose-plugin || dnf install -y docker-compose
      exit 0
    fi
    if command -v yum >/dev/null 2>&1; then
      yum install -y docker-compose-plugin || yum install -y docker-compose
      exit 0
    fi
    if command -v zypper >/dev/null 2>&1; then
      zypper --non-interactive install docker-compose
      exit 0
    fi
    echo "Unable to install Docker Compose on this host" >&2
    exit 1
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"
    - (nexus_linux_docker_compose_probe.stdout | trim) == ""

- name: Ensure the Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"
    - not ansible_check_mode or (nexus_linux_docker_service_probe.stdout | trim) != ""

- name: Ensure the runtime user is in the docker group
  ansible.builtin.user:
    name: "{{ nexus_runtime_user }}"
    groups: docker
    append: true
  become: true
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Linux"
    - not ansible_check_mode or (nexus_linux_docker_group_probe.stdout | trim) != ""

- name: Assert Homebrew is available for macOS Docker setup
  ansible.builtin.assert:
    that:
      - nexus_brew_bin is defined
      - nexus_brew_bin | length > 0
    fail_msg: "Homebrew is required for macOS Docker setup. Install Homebrew or disable nexus_manage_docker_runtime."
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"

- name: Check installed Docker/Colima Homebrew packages
  ansible.builtin.command:
    argv:
      - "{{ nexus_brew_bin }}"
      - list
      - --versions
      - "{{ item }}"
  register: nexus_macos_docker_package_checks
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ nexus_macos_docker_packages }}"
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"

- name: Install missing Docker/Colima Homebrew packages
  ansible.builtin.command:
    argv:
      - "{{ nexus_brew_bin }}"
      - install
      - "{{ item.item }}"
  loop: "{{ nexus_macos_docker_package_checks.results }}"
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"
    - item.rc != 0

- name: Resolve the Homebrew prefix
  ansible.builtin.command:
    argv:
      - "{{ nexus_brew_bin }}"
      - --prefix
  register: nexus_brew_prefix
  changed_when: false
  check_mode: false
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"

- name: Ensure Docker CLI plugin directory exists on macOS
  ansible.builtin.file:
    path: "{{ nexus_user_home }}/.docker/cli-plugins"
    state: directory
    mode: "0755"
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"

- name: Link the Docker Compose plugin into the user's CLI plugin directory
  ansible.builtin.file:
    src: "{{ nexus_brew_prefix.stdout | trim }}/lib/docker/cli-plugins/docker-compose"
    dest: "{{ nexus_user_home }}/.docker/cli-plugins/docker-compose"
    state: link
    force: true
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"

- name: Install or refresh the Colima LaunchDaemon on macOS
  ansible.builtin.command:
    argv: "{{ ['./deploy/scripts/install-colima-launchd.sh', '--profile', nexus_colima_profile, '--start-interval', nexus_colima_start_interval | string, '--user', nexus_runtime_user, '--home', nexus_user_home] + (((nexus_colima_vm_type | string | length) > 0) | ternary(['--vm-type', nexus_colima_vm_type], [])) }}"
  args:
    chdir: "{{ nexus_repo_dir }}"
  become: true
  changed_when: true
  when:
    - nexus_manage_docker_runtime | bool
    - ansible_system == "Darwin"
    - nexus_colima_launchd_enabled | bool
